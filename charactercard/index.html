<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="Card you can use as a character for a game">
    <meta property="og:url" content="https://nblguildenstern.github.io/wdd131/charactercard">
    <meta property="og:image" content="https://nblguildenstern.github.io/wdd131/charactercard/images/snortleblat.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="Card you can use as a character for a game">
    <meta name="twitter:image" content="https://nblguildenstern.github.io/wdd131/charactercard/images/snortleblat.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">
    
    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="https://nblguildenstern.github.io/wdd131/charactercard/images/snortleblat.png">

    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img class="image" width="400" height="400">
        <h1 class="name"></h1>
        <div class="stats">
            <p class="class"></p>
            <p class="level"></p>
            <p class="health"></p>
        </div>
        <div class="buttons">
            <button id="attackButton">Attacked</button>
            <button id="levelButton">Level Up</button>
        </div>
    </div>
</body>
</html>
